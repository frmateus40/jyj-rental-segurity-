<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicite su Presupuesto - JYJ Rental Security</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Open Sans', sans-serif; background: #0d0d0d; color: #fff; }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }

    :root { --red: #d32f2f; --red-hover: #b71c1c; }

    /* NAVBAR */
    nav { background: #000; position: sticky; top: 0; z-index: 1000; margin-top: 0.4cm; }
    .nav-inner {
      max-width: 100%; padding: 0 32px;
      display: flex; align-items: center; justify-content: space-between;
      height: 110px; position: relative;
    }
    .nav-links { display: flex; gap: 48px; position: absolute; right: 5cm; }
    .nav-links a {
      font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 15px;
      color: #fff; padding: 8px 16px; text-transform: uppercase; letter-spacing: 0.5px;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: #c0392b; }
    .hamburger { display: none; font-size: 24px; cursor: pointer; color: #fff; }
    .nav-presupuesto { display: none !important; }
    @media (max-width: 768px) {
      .nav-presupuesto {
        display: block !important; color: #fff !important;
        font-family: 'Montserrat', sans-serif; font-weight: 900;
        font-size: 15px; text-transform: uppercase; letter-spacing: 0.5px;
        padding: 8px 16px; background: transparent !important;
      }
    }
    @media (max-width: 1024px) {
      .nav-links { display: none; }
      .hamburger { display: block; }
      .nav-links.open {
        display: flex; flex-direction: column;
        position: fixed; top: 110px; left: 0; right: 0;
        background: #111; padding: 16px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 999;
      }
      .nav-inner > div:first-child { margin-left: 16px !important; }
      .nav-inner > div:first-child img { height: 80px !important; }
    }

    /* FORM WRAPPER */
    .form-wrapper {
      max-width: 860px;
      margin: 40px auto 60px;
      padding: 0 20px;
    }
    .form-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 22px;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .form-title span { color: var(--red); }
    .form-subtitle { color: #888; font-size: 13px; margin-bottom: 28px; }
    .form-divider { width: 50px; height: 3px; background: var(--red); margin: 10px 0 28px; border-radius: 2px; }

    /* FORM */
    .quote-form {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    @media (max-width: 600px) {
      .quote-form { grid-template-columns: 1fr; }
      .form-wrapper { margin: 24px auto 40px; padding: 0 16px; }
      .form-title { font-size: 18px; }
    }
    .quote-form-label { display: flex; flex-direction: column; gap: 6px; }
    .quote-form-label span {
      font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700;
      color: #999; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .quote-form input,
    .quote-form select {
      background: #1a1a1a; border: 1.5px solid #2e2e2e; border-radius: 6px;
      padding: 12px 14px; color: #fff; font-size: 14px; outline: none;
      transition: border-color 0.2s; width: 100%;
    }
    .quote-form input::placeholder { color: #555; }
    .quote-form input:focus,
    .quote-form select:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(211,47,47,0.12); }
    .quote-form select option { background: #1a1a1a; color: #fff; }
    .quote-form-full { grid-column: 1 / -1; }
    .btn-quote {
      width: 100%; background: var(--red); color: #fff;
      font-family: 'Montserrat', sans-serif; font-weight: 800;
      font-size: 14px; text-transform: uppercase; letter-spacing: 1px;
      padding: 15px 32px; border: none; border-radius: 6px; cursor: pointer;
      transition: background 0.2s; display: flex; align-items: center;
      justify-content: center; gap: 10px; margin-top: 6px;
    }
    .btn-quote:hover { background: var(--red-hover); }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="nav-inner">
    <div style="display:flex; align-items:center; margin-left:120px;">
      <a href="index.html">
        <img src="logo-nuevo.png" alt="JYJ Rental Security" style="height:105px; width:auto;" />
      </a>
    </div>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Inicio</a>
      <a href="nosotros.html">Nosotros</a>
      <a href="vehiculos.html">Vehículos</a>
      <a href="servicios.html">Servicios</a>
      <a href="clientes.html">Clientes</a>
      <a href="presupuesto.html" class="nav-presupuesto active">Solicite su Presupuesto</a>
    </div>
    <div class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
  </div>
</nav>

<!-- FORMULARIO -->
<div class="form-wrapper">
  <h2 class="form-title">Solicite su <span>Presupuesto</span></h2>
  <p class="form-subtitle">Complete el formulario y un asesor se comunicará con usted a la brevedad</p>
  <div class="form-divider"></div>

  <form class="quote-form" action="https://formsubmit.co/jmateus718@gmail.com" method="POST">
    <input type="hidden" name="_subject" value="Nueva Solicitud de Presupuesto - JYJ Rental" />
    <input type="hidden" name="_next" value="https://frmateus40.github.io/jyj-rental-segurity-/gracias.html" />
    <input type="hidden" name="_captcha" value="false" />
    <input type="hidden" name="_template" value="table" />

    <label class="quote-form-label">
      <span><i class="fas fa-user" style="margin-right:4px;"></i>Nombre del cliente</span>
      <input type="text" name="nombre" placeholder="Nombre completo" required />
    </label>

    <label class="quote-form-label">
      <span><i class="fas fa-envelope" style="margin-right:4px;"></i>Correo electrónico</span>
      <input type="email" name="correo" placeholder="ejemplo@correo.com" required />
    </label>

    <label class="quote-form-label">
      <span><i class="fas fa-phone" style="margin-right:4px;"></i>Teléfono</span>
      <input type="tel" name="telefono" placeholder="+57 000 000 0000" value="+57" required />
    </label>

    <label class="quote-form-label">
      <span><i class="fas fa-city" style="margin-right:4px;"></i>Ciudad</span>
      <input type="text" name="ciudad" placeholder="Ciudad de origen" />
    </label>

    <label class="quote-form-label">
      <span><i class="fas fa-building" style="margin-right:4px;"></i>Empresa que solicita</span>
      <input type="text" name="empresa" placeholder="Nombre de la empresa" />
    </label>

    <label class="quote-form-label">
      <span><i class="fas fa-shield-halved" style="margin-right:4px;"></i>Nivel de blindaje</span>
      <select name="blindaje" required>
        <option value="" disabled selected>Seleccionar nivel</option>
        <option value="II">Nivel II — Protección básica</option>
        <option value="III">Nivel III — Protección media</option>
        <option value="V">Nivel V — Protección máxima</option>
      </select>
    </label>

    <label class="quote-form-label">
      <span><i class="fas fa-calendar-days" style="margin-right:4px;"></i>Tiempo de alquiler</span>
      <select name="tiempo" required>
        <option value="" disabled selected>Seleccionar período</option>
        <option>Días</option>
        <option>Semanas</option>
        <option>Meses</option>
        <option>Años</option>
      </select>
    </label>

    <label class="quote-form-label quote-form-full">
      <span><i class="fas fa-comment-dots" style="margin-right:4px;"></i>Información adicional (opcional)</span>
      <input type="text" name="info" placeholder="Destino, número de pasajeros, requerimientos especiales..." />
    </label>

    <div class="quote-form-full" style="margin-top:6px;">
      <button type="submit" class="btn-quote">
        <i class="fas fa-paper-plane"></i> Enviar Solicitud de Presupuesto
      </button>
    </div>
  </form>
</div>

<script>
  function toggleMenu() {
    document.getElementById('navLinks').classList.toggle('open');
  }
  document.querySelectorAll('.nav-links a').forEach(link => {
    link.addEventListener('click', () => {
      document.getElementById('navLinks').classList.remove('open');
    });
  });
</script>
</body>
</html>
