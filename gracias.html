<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gracias - JYJ Rental Security</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', sans-serif; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
    .card { max-width: 500px; }
    .icon { font-size: 72px; margin-bottom: 24px; }
    h1 { font-size: 32px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; color: #c9a44c; }
    p { color: #aaa; font-size: 15px; line-height: 1.8; margin-bottom: 32px; }
    a { display: inline-block; background: #d32f2f; color: #fff; padding: 14px 36px; border-radius: 4px; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; transition: background .2s; }
    a:hover { background: #b71c1c; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>¡Mensaje Enviado!</h1>
    <p>Hemos recibido tu solicitud correctamente.<br>Un asesor de JYJ Rental se comunicará contigo a la brevedad.</p>
    <a href="index.html">Volver al Inicio</a>
  </div>
</body>
</html>
